name: Build GoodAgent Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        working-directory: desktop
        run: npm ci
      - name: Build Windows
        working-directory: desktop
        run: npx electron-builder --win nsis
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoodAgent-Windows
          path: desktop/release/GoodAgent-*-Windows-*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        working-directory: desktop
        run: npm ci
      - name: Build macOS
        working-directory: desktop
        run: npx electron-builder --mac dmg
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoodAgent-macOS
          path: desktop/release/GoodAgent-*-macOS-*.dmg
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss-dev libasound2-dev
      - name: Install dependencies
        working-directory: desktop
        run: npm ci
      - name: Build Linux
        working-directory: desktop
        run: npx electron-builder --linux deb AppImage
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoodAgent-Linux
          path: |
            desktop/release/GoodAgent-*-Linux-*.deb
            desktop/release/GoodAgent-*-Linux-*.AppImage
          if-no-files-found: error
