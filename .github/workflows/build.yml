name: Build AideAgent Desktop

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        working-directory: desktop
        run: npm ci
      - name: Build Windows
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AideAgent-Windows
          path: |
            desktop/release/AideAgent-*-Windows-*.exe
            desktop/release/latest.yml
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        working-directory: desktop
        run: npm ci
      - name: Build macOS
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac dmg
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AideAgent-macOS
          path: |
            desktop/release/AideAgent-*-macOS-*.dmg
            desktop/release/latest-mac.yml
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss-dev libasound2-dev
      - name: Install dependencies
        working-directory: desktop
        run: npm ci
      - name: Build Linux
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux deb AppImage
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AideAgent-Linux
          path: |
            desktop/release/AideAgent-*-Linux-*.deb
            desktop/release/AideAgent-*-Linux-*.AppImage
            desktop/release/latest-linux.yml
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Display structure
        run: ls -R release-artifacts
      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./desktop/package.json').version")" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: AideAgent Desktop v${{ steps.version.outputs.VERSION }}
          files: release-artifacts/**/*
          draft: false
          generate_release_notes: true
